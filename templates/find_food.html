        function encryptData(data) {
            // Simple encryption for demonstration (in production, use proper encryption libraries)

        }
        
        function decryptData(encryptedData) {
            // Simple decryption for demonstration (in production, use proper decryption libraries)
            try {
                const decrypted = atob(encryptedData);
                return JSON.parse(decrypted);
            } catch (error) {
                console.error('Decryption error:', error);
                return null;
            }
        }
        
        function generateEncryptionKey() {
            // Generate a simple encryption key (in production, use proper key generation)
            const key = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('encryptionKey', key);
            return key;
        }
        
        function getEncryptionKey() {
            let key = localStorage.getItem('encryptionKey');
            if (!key) {
                key = generateEncryptionKey();
            }
            return key;
        }
        
        function secureEncrypt(data) {
            const key = getEncryptionKey();
            const dataWithKey = {
                data: data,
                key: key,
                timestamp: Date.now()

            // Always center on Solapur, India (ignore browser location)
            const coords = talukaCoords[centerLocation] || [17.6599, 75.9064]; // Solapur City
            
            // Create map centered on Solapur

                center: [coords[0], coords[1]],
                zoom: 11,
                zoomControl: true
            });
            
            // Street Map Layer (Default)
            streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            });
            
            // Satellite Layer (Esri World Imagery - FREE)
            satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles © Esri',
                maxZoom: 19
            });
            
            // Hybrid Layer (Satellite + Labels)
            const hybridLayer = L.layerGroup([
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: 'Tiles © Esri',
                    maxZoom: 19
                }),
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
                    attribution: '© CARTO',
                    maxZoom: 19,
                    subdomains: 'abcd'
                })
            ]);
            
            // Add default layer

                "🛰️ Satellite": satelliteLayer,

            };
            
            L.control.layers(baseLayers, null, {

            }).addTo(map);

                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        
                        // Add user marker with pulsing animation
                        const userIcon = L.divIcon({
                            className: 'user-location-marker',
                            html: `
                                <div style="position: relative;">
                                    <div style="
                                        position: absolute;
                                        width: 40px;
                                        height: 40px;
                                        background: rgba(66, 133, 244, 0.3);
                                        border-radius: 50%;
                                        animation: pulse 2s infinite;
                                        top: -10px;
                                        left: -10px;
                                    "></div>
                                    <div style="
                                        background: #4285F4;
                                        width: 20px;
                                        height: 20px;
                                        border-radius: 50%;
                                        border: 3px solid white;
                                        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
                                    "></div>
                                </div>
                                <style>
                                    @keyframes pulse {
                                        0% { transform: scale(0.5); opacity: 1; }
                                        100% { transform: scale(1.5); opacity: 0; }
                                    }
                                </style>
                            `,
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });
                        
                        userMarker = L.marker([userLocation.lat, userLocation.lng], {
                            icon: userIcon,
                            title: 'Your Location',
                            zIndexOffset: 1000
                        }).addTo(map);
                        
                        userMarker.bindPopup('<b>📍 Your Location</b>').openPopup();
                        
                        // Add accuracy circle
                        L.circle([userLocation.lat, userLocation.lng], {
                            radius: position.coords.accuracy,
                            color: '#4285F4',
                            fillColor: '#4285F4',
                            fillOpacity: 0.1,
                            weight: 1
                        }).addTo(map);
                        
                        map.setView([userLocation.lat, userLocation.lng], 12);
                    },
                    (error) => {
                        console.log('Location error:', error);
                        // Show message to user
                        const locationBtn = L.control({position: 'topleft'});
                        locationBtn.onAdd = function() {
                            const div = L.DomUtil.create('div', 'location-error');
                            div.innerHTML = '<div style="background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">📍 Enable location for accurate distances</div>';
                            return div;
                        };
                        locationBtn.addTo(map);
                    }
                );
            }
        }
        
        // Add food markers with geocoding for accurate locations
        async function addFoodMarkers(foods) {
            if (!map) return;
            
            // Clear existing markers (except user marker)
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            for (let index = 0; index < foods.length; index++) {
                const food = foods[index];
                let coords = null;
                let locationSource = '';
                
                // Priority 1: Try exact match with area name
                coords = villageCoords[food.area];
                if (coords) {
                    locationSource = `area exact match: ${food.area}`;
                }
                
                // Priority 2: Extract village from compound area names
                // e.g., "Pandharpur - Gopalpur" → "Gopalpur"
                if (!coords && food.area.includes(' - ')) {
                    const parts = food.area.split(' - ');
                    const villageName = parts[parts.length - 1].trim();
                    coords = villageCoords[villageName];
                    if (coords) {
                        locationSource = `compound area: ${food.area} → ${villageName}`;
                    }
                }
                
                // Priority 3: Parse pickup address for village names
                // Clean and extract village from pickup address
                if (!coords && food.pickup_address) {
                    // Remove common prefixes and clean address
                    let cleanAddress = food.pickup_address
                        .replace(/\bat post\b/gi, '')
                        .replace(/\bat\b/gi, '')
                        .replace(/\bpost\b/gi, '')
                        .replace(/[-,]/g, ' ')
                        .replace(/\s+/g, ' ')
                        .trim()
                        .toLowerCase();
                    
                    // Try to find any village name in the pickup address
                    for (const [villageName, villageCoord] of Object.entries(villageCoords)) {
                        if (cleanAddress.includes(villageName.toLowerCase())) {
                            coords = villageCoord;
                            locationSource = `pickup address match: "${food.pickup_address}" → ${villageName}`;
                            break;
                        }
                    }
                }
                
                // Priority 4: Fallback to taluka headquarters
                if (!coords) {
                    coords = talukaCoords[food.taluka];
                    locationSource = `taluka fallback: ${food.taluka}`;
                }
                
                console.log(`📍 [${index + 1}] ${food.title} | ${locationSource} | Coords: ${coords}`);
                
                if (!coords) {
                    console.log(`❌ No coordinates found for ${food.area}`);
                    continue;
                }
                
                // Calculate distance
                let distance = 'Unknown';
                let color = '#4CAF50';
                
                if (userLocation) {
                    const d = calculateDistance(
                        userLocation.lat, userLocation.lng,
                        coords[0], coords[1]
                    );
                    distance = d.toFixed(1) + ' km';
                    color = d < 5 ? '#4CAF50' : d < 15 ? '#FF9800' : '#F44336';
                }
                
                // Create custom marker icon with number
                const markerIcon = L.divIcon({
                    className: 'food-marker',
                    html: `
                        <div style="position: relative;">
                            <div style="
                                background: ${color};
                                width: 32px;
                                height: 32px;
                                border-radius: 50% 50% 50% 0;
                                transform: rotate(-45deg);
                                border: 3px solid white;
                                box-shadow: 0 3px 10px rgba(0,0,0,0.4);
                            "></div>
                            <div style="
                                position: absolute;
                                top: 6px;
                                left: 8px;
                                color: white;
                                font-weight: bold;
                                font-size: 12px;
                                transform: rotate(45deg);
                            ">${index + 1}</div>
                        </div>
                    `,
                    iconSize: [32, 32],
                    iconAnchor: [16, 32],
                    popupAnchor: [0, -32]
                });
                
                const marker = L.marker([coords[0], coords[1]], {
                    icon: markerIcon,
                    title: food.title
                }).addTo(map);
                
                // Create popup content
                const popupContent = `
                    <div style="padding: 12px; max-width: 280px; font-family: Arial, sans-serif;">
                        <div style="display: flex; align-items: center; margin-bottom: 12px;">
                            <span style="
                                background: ${color};
                                color: white;
                                width: 28px;
                                height: 28px;
                                border-radius: 50%;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-weight: bold;
                                margin-right: 10px;
                            ">${index + 1}</span>
                            <h3 style="margin: 0; color: #2d7a4f; font-size: 16px; flex: 1;">${food.title}</h3>
                        </div>
                        <div style="border-top: 2px solid #e0e0e0; padding-top: 10px;">
                            <p style="margin: 6px 0; font-size: 13px;"><strong>🍽️ Type:</strong> ${food.food_type}</p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>📦 Quantity:</strong> ${food.quantity}</p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>📍 Taluka:</strong> ${food.taluka}</p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>🏘️ Village:</strong> ${food.area || 'N/A'}</p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>📏 Distance:</strong> <span style="color: ${color}; font-weight: bold;">${distance}</span></p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>🏠 Pickup:</strong> ${food.pickup_address}</p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>👤 Contact:</strong> ${food.contact_person_name}</p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>📞 Phone:</strong> ${food.contact_person_phone}</p>
                            <p style="margin: 6px 0; font-size: 13px;"><strong>⏰ Expires:</strong> ${new Date(food.expiry_time).toLocaleString()}</p>
                        </div>
                        <div style="display: flex; gap: 8px; margin-top: 12px;">
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${coords[0]},${coords[1]}" target="_blank" 
                               style="
                                   flex: 1;
                                   padding: 10px 15px;
                                   background: ${color};
                                   color: white;
                                   text-decoration: none;
                                   border-radius: 6px;
                                   font-size: 14px;
                                   text-align: center;
                                   font-weight: bold;
                                   box-shadow: 0 2px 5px rgba(0,0,0,0.2);
                               ">
                                🚗 Google Maps
                            </a>
                            <button onclick="showRoute(${index})" 
                               style="
                                   flex: 1;
                                   padding: 10px 15px;
                                   background: #2196F3;
                                   color: white;
                                   border: none;
                                   border-radius: 6px;
                                   font-size: 14px;
                                   text-align: center;
                                   font-weight: bold;
                                   box-shadow: 0 2px 5px rgba(0,0,0,0.2);
                                   cursor: pointer;
                               ">
                                🗺️ Show Route
                            </button>
                        </div>
                    </div>
                `;
                
                marker.bindPopup(popupContent, {
                    maxWidth: 300,
                    className: 'custom-popup'
                });
                
                // Open popup on hover
                marker.on('mouseover', function() {
                    this.openPopup();
                });
                
                markers.push(marker);
            }
            
            // Fit map to show all markers
            if (markers.length > 0) {
                const group = L.featureGroup(markers);
                if (userMarker) {
                    group.addLayer(userMarker);
                }
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }
        
        // Calculate distance (Haversine formula)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        // Focus on specific marker when food card is clicked
        function focusOnMarker(index) {
            if (!map || !markers[index]) return;
            
            const marker = markers[index];
            
            // Zoom to marker
            map.setView(marker.getLatLng(), 15, {
                animate: true,
                duration: 1
            });
            
            // Open popup
            setTimeout(() => {
                marker.openPopup();
            }, 500);
            
            // Scroll to map
            document.getElementById('mapSection').scrollIntoView({ 
                behavior: 'smooth',
                block: 'center'
            });
            
            // Highlight marker temporarily
            const originalIcon = marker.getIcon();
            const highlightIcon = L.divIcon({
                className: 'food-marker-highlight',
                html: `
                    <div style="position: relative; animation: bounce 0.5s ease-in-out 3;">
                        <div style="
                            background: #FFD700;
                            width: 40px;
                            height: 40px;
                            border-radius: 50% 50% 50% 0;
                            transform: rotate(-45deg);
                            border: 4px solid white;
                            box-shadow: 0 5px 15px rgba(255,215,0,0.6);
                        "></div>
                        <div style="
                            position: absolute;
                            top: 8px;
                            left: 10px;
                            color: white;
                            font-weight: bold;
                            font-size: 14px;
                            transform: rotate(45deg);
                        ">${index + 1}</div>
                    </div>
                    <style>
                        @keyframes bounce {
                            0%, 100% { transform: translateY(0); }
                            50% { transform: translateY(-10px); }
                        }
                    </style>
                `,
                iconSize: [40, 40],
                iconAnchor: [20, 40],
                popupAnchor: [0, -40]
            });
            
            marker.setIcon(highlightIcon);
            
            // Reset icon after 2 seconds
            setTimeout(() => {
                marker.setIcon(originalIcon);
            }, 2000);
        }
        
        // Show route from user location to food location
        let currentRoute = null;
        function showRoute(index) {
            if (!markers[index]) return;
            
            const destination = markers[index].getLatLng();
            
            if (!userLocation) {
                // If no user location, just zoom to food location
                map.setView(destination, 15, {
                    animate: true,
                    duration: 1
                });
                markers[index].openPopup();
                alert('📍 Location services not enabled.\n\nShowing food location on map.\n\nFor route, please enable location or use "Google Maps" button.');
                return;
            }
            
            // Remove previous route if exists
            if (currentRoute) {
                map.removeControl(currentRoute);
            }
            
            // Create route
            currentRoute = L.Routing.control({
                waypoints: [
                    L.latLng(userLocation.lat, userLocation.lng),
                    L.latLng(destination.lat, destination.lng)
                ],
                routeWhileDragging: false,
                show: true,
                addWaypoints: false,
                draggableWaypoints: false,
                fitSelectedRoutes: true,
                showAlternatives: false,
                lineOptions: {
                    styles: [{color: '#2196F3', opacity: 0.8, weight: 6}]
                },
                createMarker: function() { return null; }, // Don't create extra markers
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://router.project-osrm.org/route/v1'
                })
            }).addTo(map);
            
            // Show route instructions
            currentRoute.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                const distance = (summary.totalDistance / 1000).toFixed(1);
                const time = Math.round(summary.totalTime / 60);
                
                alert(`🗺️ Route Found!\n\n📏 Distance: ${distance} km\n⏱️ Time: ${time} minutes\n\nBlue line shows the route on map.`);
            });
        }
        
        async function searchFood() {
            const location = document.getElementById('locationSelect').value;
            const results = document.getElementById('results');
            const title = document.getElementById('resultsTitle');
            const subtitle = document.getElementById('resultsSubtitle');
            const grid = document.getElementById('foodGrid');
            
            console.log('🔍 Searching for food in:', location);
            
            if (!location) {
                alert('Please select your location');
                return;
            }
            
            try {
                const response = await fetch(`/api/food/available-in-area?taluka=${encodeURIComponent(location)}`);
                const data = await response.json();
                
                console.log('📦 Response:', data);
                
                results.style.display = 'block';
                
                if (data.foods && data.foods.length > 0) {
                    // Show map - OpenStreetMap always works!
                    document.getElementById('mapSection').style.display = 'block';
                    initMap(location);
                    
                    // Wait for map to initialize, then add markers with geocoding
                    setTimeout(async () => {
                        await addFoodMarkers(data.foods);
                    }, 500);
                    
                    title.textContent = `${data.foods.length} Food Items Available`;
                    subtitle.textContent = `Showing results for ${location}`;
                    
                    grid.innerHTML = data.foods.map((food, index) => {
                        // Calculate distance for card display
                        let distanceText = '';
                        let distanceBadgeColor = '#FF9800';
                        
                        if (userLocation) {
                            const coords = villageCoords[food.area] || talukaCoords[food.taluka];
                            if (coords) {
                                const d = calculateDistance(
                                    userLocation.lat, userLocation.lng,
                                    coords[0], coords[1]
                                );
                                distanceText = `📏 ${d.toFixed(1)} km away`;
                                distanceBadgeColor = d < 5 ? '#4CAF50' : d < 15 ? '#FF9800' : '#F44336';
                            }
                        }
                        
                        return `
                            <div class="food-card" onclick="focusOnMarker(${index})" style="cursor:pointer;">
                                <div style="display:flex; align-items:center; margin-bottom:12px; gap:10px;">
                                    <span style="background:rgba(74,222,128,0.2); border:1px solid rgba(74,222,128,0.4); color:#4ade80; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.85rem; flex-shrink:0;">${index + 1}</span>
                                    <h3 style="margin:0; flex:1; color:#86efac; font-size:1.05rem;">${food.title}</h3>
                                </div>
                                <p><strong>🍽️ Type:</strong> ${food.food_type}</p>
                                <p><strong>📦 Quantity:</strong> ${food.quantity}</p>
                                <p><strong>📍 Location:</strong> ${food.taluka} - ${food.area || 'N/A'}</p>
                                <p><strong>🏠 Pickup:</strong> ${food.pickup_address}</p>
                                <p><strong>📞 Contact:</strong> ${food.contact_person_name} - ${food.contact_person_phone}</p>
                                <p><strong>⏰ Expires:</strong> ${new Date(food.expiry_time).toLocaleString()}</p>
                                <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
                                    <span class="location-badge">📍 ${food.taluka}</span>
                                    ${distanceText ? `<span class="distance-badge">${distanceText}</span>` : ''}
                                </div>
                                <div style="margin-top:12px; padding:9px; background:rgba(134,239,172,0.08); border:1px solid rgba(134,239,172,0.2); border-radius:10px; text-align:center; font-size:0.82rem; color:#86efac; font-weight:600;">
                                    🗺️ Click to view on map
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    results.scrollIntoView({ behavior: 'smooth' });
                } else {
                    title.textContent = 'No Food Available';
                    subtitle.textContent = `No food items found in ${location}`;
                    grid.innerHTML = `
                        <div class="no-results">
                            <h3>😔 No food available in this area</h3>
                            <p>Try selecting a different location or check back later</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('❌ Error:', error);
                alert('Error loading food items. Please try again.');
            }
        }
    </script>
