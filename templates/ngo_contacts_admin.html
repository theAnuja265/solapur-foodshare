<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Contacts - Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; min-height:100vh; background:#0a0a0a; position:relative; }

        .page-bg-container { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden; }
        .page-bg { position:absolute; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; opacity:0; transition:opacity 2s ease-in-out; filter:blur(3px) brightness(0.55); }
        .page-bg.active { opacity:1; }
        .page-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); }

        /* Admin Login Overlay */
        .login-overlay {
            position:fixed; inset:0;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
            display:flex; align-items:center; justify-content:center; z-index:9999;
        }
        .login-box {
            background:rgba(255,255,255,0.08); backdrop-filter:blur(24px);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:24px; padding:44px 40px;
            width:90%; max-width:420px; text-align:center;
            box-shadow:0 24px 60px rgba(0,0,0,0.5);
        }
        .login-box .lock-icon { font-size:3rem; margin-bottom:16px; }
        .login-box h2 { color:#fff; font-size:1.6rem; font-weight:800; margin-bottom:6px; }
        .login-box p  { color:rgba(255,255,255,0.55); font-size:0.9rem; margin-bottom:28px; }
        .login-box input {
            width:100%; padding:13px 16px;
            background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2);
            border-radius:12px; font-size:1rem; color:#fff; margin-bottom:14px;
            transition:border-color 0.2s;
        }
        .login-box input::placeholder { color:rgba(255,255,255,0.4); }
        .login-box input:focus { outline:none; border-color:#4ade80; }
        .login-box button {
            width:100%; padding:13px;
            background:linear-gradient(135deg,#4ade80,#16a34a);
            color:white; border:none; border-radius:12px; font-size:1rem;
            font-weight:700; cursor:pointer; transition:all 0.2s;
        }
        .login-box button:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(74,222,128,0.4); }
        .login-box .back-link { display:block; margin-top:16px; color:rgba(255,255,255,0.5); font-size:0.85rem; text-decoration:none; }
        .login-box .back-link:hover { color:#d8b4fe; }
        .login-err { color:#ef9a9a; font-size:0.85rem; margin-top:8px; display:none; }

        nav {
            background:rgba(0,0,0,0.3); backdrop-filter:blur(16px);
            border-bottom:1px solid rgba(255,255,255,0.08);
            padding:13px 24px; display:flex; align-items:center;
            justify-content:space-between; position:sticky; top:0; z-index:100;
        }
        .nav-logo { color:white; font-size:1.1rem; font-weight:800; text-decoration:none; letter-spacing:0.5px; }
        .nav-back { color:#d8b4fe; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
            padding:7px 18px; border-radius:20px; cursor:pointer; font-size:0.85rem;
            text-decoration:none; font-weight:600; transition:all 0.2s; }
        .nav-back:hover { background:rgba(255,255,255,0.18); }

        .hero {
            background:rgba(255,255,255,0.06); backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(255,255,255,0.08);
            color:white; padding:28px 24px; text-align:center;
        }
        .hero h1 { font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,#fff,#a5d6a7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .hero p  { color:rgba(255,255,255,0.6); margin-top:6px; }

        .content { max-width:900px; margin:24px auto; padding:0 16px; }

        .add-card {
            background:rgba(255,255,255,0.07); backdrop-filter:blur(16px);
            border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:24px;
            box-shadow:0 8px 30px rgba(0,0,0,0.3); margin-bottom:24px;
            border-top:3px solid rgba(134,239,172,0.5);
        }
        .add-card h3 { font-size:1rem; color:#86efac; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        @media(max-width:600px){ .form-grid { grid-template-columns:1fr; } }
        .form-group { display:flex; flex-direction:column; gap:4px; }
        .form-group label { font-size:0.8rem; font-weight:600; color:rgba(255,255,255,0.6); }
        .form-group input, .form-group select {
            padding:10px 12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2);
            border-radius:8px; font-size:0.9rem; color:#fff; transition:border-color 0.2s;
        }
        .form-group input::placeholder { color:rgba(255,255,255,0.35); }
        .form-group select option { background:#1e1e2e; color:#fff; }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:#4ade80; }
        .add-btn {
            margin-top:14px; width:100%; padding:12px;
            background:linear-gradient(135deg,#4ade80,#16a34a);
            color:white; border:none; border-radius:10px;
            font-size:0.95rem; font-weight:700; cursor:pointer; transition:all 0.2s;
        }
        .add-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(74,222,128,0.4); }

        .alert { padding:10px 16px; border-radius:10px; margin-bottom:16px; font-size:0.85rem; display:none; }
        .alert.show { display:block; }
        .alert-ok  { background:rgba(76,175,80,0.15); color:#a5d6a7; border:1px solid rgba(76,175,80,0.3); }
        .alert-err { background:rgba(244,67,54,0.15); color:#ef9a9a; border:1px solid rgba(244,67,54,0.3); }

        .table-card {
            background:rgba(255,255,255,0.07); backdrop-filter:blur(16px);
            border:1px solid rgba(255,255,255,0.12); border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,0.3); overflow:hidden;
        }
        .table-header {
            background:rgba(255,255,255,0.08); border-bottom:1px solid rgba(255,255,255,0.1);
            color:white; padding:14px 20px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .table-header h3 { font-size:1rem; color:#d8b4fe; font-weight:700; }
        .count-badge { background:rgba(255,255,255,0.15); padding:3px 12px; border-radius:12px; font-size:0.82rem; color:rgba(255,255,255,0.8); }
        table { width:100%; border-collapse:collapse; }
        th { background:rgba(255,255,255,0.05); padding:10px 16px; text-align:left; font-size:0.78rem; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid rgba(255,255,255,0.08); }
        td { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.06); font-size:0.88rem; color:rgba(255,255,255,0.8); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,0.04); }
        .active-badge { background:rgba(74,222,128,0.2); color:#4ade80; border:1px solid rgba(74,222,128,0.3); padding:2px 10px; border-radius:10px; font-size:0.75rem; font-weight:700; }
        .del-btn { background:rgba(244,67,54,0.15); color:#ef9a9a; border:1px solid rgba(244,67,54,0.3); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:0.8rem; font-weight:600; transition:all 0.2s; }
        .del-btn:hover { background:rgba(244,67,54,0.3); }
        .empty-row td { text-align:center; padding:30px; color:rgba(255,255,255,0.4); }
        .spinner { width:32px; height:32px; border:4px solid rgba(255,255,255,0.1); border-top-color:#4ade80; border-radius:50%; animation:spin 0.8s linear infinite; margin:20px auto; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div class="page-bg-container">
    <div class="page-bg active" style="background-image:url('https://images.unsplash.com/photo-1593113598332-cd288d649433?w=1920&q=90');"></div>
    <div class="page-bg" style="background-image:url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=1920&q=90');"></div>
    <div class="page-overlay"></div>
</div>

<!-- Admin Login Screen -->
<div id="loginScreen" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:9999;">
    <div style="background:rgba(255,255,255,0.08);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:44px 40px;width:90%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,0.5);text-align:center;">
        <div style="font-size:3rem;margin-bottom:14px;">🔐</div>
        <h2 style="color:#fff;margin-bottom:6px;font-size:1.6rem;font-weight:800;">Admin Access</h2>
        <p style="color:rgba(255,255,255,0.5);font-size:0.88rem;margin-bottom:28px;">NGO Contacts Management</p>
        <input type="password" id="adminPassInput" placeholder="Enter admin password"
            style="width:100%;padding:13px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:12px;font-size:1rem;color:#fff;margin-bottom:12px;box-sizing:border-box;"
            onkeydown="if(event.key==='Enter') verifyAdmin()">
        <div id="loginError" style="color:#ef9a9a;font-size:0.82rem;margin-bottom:10px;display:none;">❌ Wrong password</div>
        <button onclick="verifyAdmin()"
            style="width:100%;padding:13px;background:linear-gradient(135deg,#4ade80,#16a34a);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;">
            Login as Admin
        </button>
        <a href="/" style="display:block;margin-top:16px;color:rgba(255,255,255,0.45);font-size:0.82rem;text-decoration:none;">← Back to Home</a>
    </div>
</div>

<!-- Main Admin Page (hidden until login) -->
<div id="mainContent" style="display:none;">
<nav>
    <a href="/" class="nav-logo">🍽️ FoodShare Admin</a>
    <a href="/" class="nav-back"><i class="fas fa-arrow-left"></i> Home</a>
</nav>

<div class="hero">
    <h1>📱 NGO SMS Contacts</h1>
    <p>Manage NGO phone numbers for food donation SMS alerts</p>
</div>

<div class="content">
    <div id="alertBox" class="alert"></div>

    <!-- Add Form -->
    <div class="add-card">
        <h3><i class="fas fa-plus-circle"></i> Add New NGO Contact</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>NGO Name *</label>
                <input type="text" id="ngoName" placeholder="e.g. Palawi NGO">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="ngoPhone" placeholder="e.g. 09673664455">
            </div>
            <div class="form-group">
                <label>Area / Village</label>
                <input type="text" id="ngoArea" placeholder="e.g. Pandharpur">
            </div>
            <div class="form-group">
                <label>Taluka</label>
                <select id="ngoTaluka">
                    <option value="">-- Select Taluka --</option>
                    <option>Pandharpur</option>
                    <option>Barshi</option>
                    <option>Solapur City</option>
                    <option>Mohol</option>
                    <option>Akkalkot</option>
                    <option>Malshiras</option>
                    <option>Karmala</option>
                    <option>Mangalvedhe</option>
                    <option>Sangola</option>
                    <option>Madha</option>
                    <option>North Solapur</option>
                    <option>South Solapur</option>
                </select>
            </div>
        </div>
        <button class="add-btn" onclick="addContact()">
            <i class="fas fa-plus"></i> Add NGO Contact
        </button>
    </div>

    <!-- Contacts Table -->
    <div class="table-card">
        <div class="table-header">
            <h3>📋 NGO Contact List</h3>
            <span class="count-badge" id="countBadge">Loading...</span>
        </div>
        <div id="tableBody">
            <div class="spinner"></div>
        </div>
    </div>
</div>

<script>
let adminPassword = '';

// Background rotation
let bgIdx = 0;
const bgImgs = document.querySelectorAll('.page-bg');
if (bgImgs.length) setInterval(() => { bgImgs[bgIdx].classList.remove('active'); bgIdx=(bgIdx+1)%bgImgs.length; bgImgs[bgIdx].classList.add('active'); }, 5000);

async function verifyAdmin() {
    const pass = document.getElementById('adminPassInput').value;
    const errEl = document.getElementById('loginError');
    if (!pass) return;
    try {
        const res = await fetch('/api/admin/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ admin_password: pass })
        });
        const data = await res.json();
        if (data.success) {
            adminPassword = pass;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadContacts();
        } else {
            errEl.style.display = 'block';
            document.getElementById('adminPassInput').value = '';
        }
    } catch(e) {
        errEl.style.display = 'block';
    }
}

async function loadContacts() {
    try {
        const res  = await fetch('/api/ngo-contacts');
        const data = await res.json();
        const list = data.contacts || [];

        document.getElementById('countBadge').textContent = `${list.length} contacts`;

        if (list.length === 0) {
            document.getElementById('tableBody').innerHTML = `
                <table><tr class="empty-row"><td colspan="5">No NGO contacts yet. Add one above.</td></tr></table>`;
            return;
        }

        let html = `<table>
            <thead><tr>
                <th>#</th><th>Name</th><th>Phone</th><th>Area / Taluka</th><th>Action</th>
            </tr></thead><tbody>`;

        list.forEach((c, i) => {
            html += `<tr>
                <td>${i+1}</td>
                <td><strong>${c.name}</strong></td>
                <td>📱 ${c.phone}</td>
                <td>${c.area || '—'}${c.taluka ? ' · ' + c.taluka : ''}</td>
                <td><button class="del-btn" onclick="deleteContact(${c.id}, '${c.name}')">
                    <i class="fas fa-trash"></i> Delete
                </button></td>
            </tr>`;
        });

        html += '</tbody></table>';
        document.getElementById('tableBody').innerHTML = html;
    } catch(e) {
        document.getElementById('tableBody').innerHTML =
            '<p style="padding:20px;color:#c62828;">Error loading contacts</p>';
    }
}

async function addContact() {
    const name   = document.getElementById('ngoName').value.trim();
    const phone  = document.getElementById('ngoPhone').value.trim();
    const area   = document.getElementById('ngoArea').value.trim();
    const taluka = document.getElementById('ngoTaluka').value;

    if (!name || !phone) {
        showAlert('Name and phone number are required.', 'err');
        return;
    }

    try {
        const res = await fetch('/api/ngo-contacts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, area, taluka, admin_password: adminPassword })
        });
        const data = await res.json();

        if (res.ok) {
            showAlert(`✅ ${data.message}`, 'ok');
            document.getElementById('ngoName').value  = '';
            document.getElementById('ngoPhone').value = '';
            document.getElementById('ngoArea').value  = '';
            document.getElementById('ngoTaluka').value = '';
            loadContacts();
        } else {
            showAlert('❌ ' + data.message, 'err');
        }
    } catch(e) {
        showAlert('❌ Error: ' + e.message, 'err');
    }
}

async function deleteContact(id, name) {
    if (!confirm(`Delete ${name}?`)) return;
    try {
        const res = await fetch(`/api/ngo-contacts/${id}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ admin_password: adminPassword })
        });
        if (res.ok) {
            showAlert(`✅ ${name} deleted`, 'ok');
            loadContacts();
        } else {
            const d = await res.json();
            showAlert('❌ ' + d.message, 'err');
        }
    } catch(e) {
        showAlert('❌ Error: ' + e.message, 'err');
    }
}

function showAlert(msg, type) {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = `alert show alert-${type}`;
    setTimeout(() => el.classList.remove('show'), 4000);
}
</script>

    <!-- Language Switcher -->
    </body>
</html>
